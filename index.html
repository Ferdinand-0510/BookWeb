<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>預約日曆 · Morandi Booking</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    /* 莫蘭迪色系 */
    --morandi-blue:        #8FA8B8;
    --morandi-blue-deep:   #6B8497;
    --morandi-blue-soft:   #B7C7D1;
    --morandi-blue-mist:   #DCE5EB;
    --morandi-cream:       #F5F1EA;
    --morandi-paper:       #FBF9F5;
    --morandi-gray:        #A8A7A1;
    --morandi-gray-soft:   #D8D5CE;
    --morandi-ink:         #3F4A52;
    --morandi-ink-soft:    #6D7780;
    --morandi-rose:        #C6A9A1;
    --morandi-accent:      #93AFA0;

    --shadow-soft: 0 8px 30px rgba(107, 132, 151, 0.10), 0 2px 6px rgba(63, 74, 82, 0.04);
    --shadow-card: 0 4px 16px rgba(107, 132, 151, 0.08);
    --shadow-modal: 0 24px 60px rgba(63, 74, 82, 0.18);

    --radius-sm: 10px;
    --radius-md: 16px;
    --radius-lg: 24px;

    --ease: cubic-bezier(.22,.61,.36,1);
  }

  *{ box-sizing: border-box; }

  html, body{
    margin: 0;
    padding: 0;
    background:
      radial-gradient(1200px 600px at 10% -10%, #E7EEF2 0%, transparent 60%),
      radial-gradient(900px 500px at 110% 10%, #EDE6DC 0%, transparent 55%),
      var(--morandi-paper);
    color: var(--morandi-ink);
    font-family: "DM Sans", "Noto Sans TC", -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  .app{
    max-width: 1080px;
    margin: 0 auto;
    padding: 48px 28px 80px;
  }

  /* --- 頁首 --- */
  .header{
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 32px;
  }
  .brand{
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .brand-mark{
    width: 44px; height: 44px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--morandi-blue) 0%, var(--morandi-blue-deep) 100%);
    display: grid; place-items: center;
    color: #fff;
    font-weight: 700;
    box-shadow: var(--shadow-card);
    letter-spacing: .5px;
  }
  .brand h1{
    font-size: 22px;
    margin: 0;
    font-weight: 500;
    letter-spacing: .5px;
  }
  .brand p{
    margin: 4px 0 0;
    font-size: 13px;
    color: var(--morandi-ink-soft);
    letter-spacing: 1px;
  }
  .today-chip{
    background: #fff;
    border: 1px solid var(--morandi-blue-mist);
    color: var(--morandi-ink-soft);
    padding: 10px 16px;
    border-radius: 999px;
    font-size: 13px;
    box-shadow: var(--shadow-card);
    letter-spacing: .5px;
  }

  /* --- 卡片 --- */
  .card{
    background: #fff;
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-soft);
    padding: 28px;
  }

  /* --- 月曆控制列 --- */
  .cal-head{
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 22px;
    gap: 10px;
  }
  .cal-title{
    font-size: 26px;
    font-weight: 500;
    color: var(--morandi-ink);
    letter-spacing: 1px;
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .cal-title .year{
    font-size: 14px;
    color: var(--morandi-ink-soft);
    font-weight: 400;
    letter-spacing: 2px;
  }
  .cal-nav{
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .nav-btn{
    width: 40px; height: 40px;
    border-radius: 12px;
    border: 1px solid var(--morandi-blue-mist);
    background: #fff;
    color: var(--morandi-blue-deep);
    cursor: pointer;
    display: grid; place-items: center;
    transition: all .25s var(--ease);
    font-size: 16px;
  }
  .nav-btn:hover{
    background: var(--morandi-blue);
    color: #fff;
    border-color: var(--morandi-blue);
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(143,168,184,.35);
  }
  .nav-btn:active{ transform: translateY(0); }
  .today-btn{
    width: auto;
    padding: 0 16px;
    font-size: 13px;
    letter-spacing: 1px;
  }

  /* --- 月曆網格 --- */
  .weekdays{
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
    margin-bottom: 10px;
  }
  .weekday{
    text-align: center;
    font-size: 12px;
    color: var(--morandi-ink-soft);
    letter-spacing: 2px;
    padding: 8px 0;
    font-weight: 500;
  }
  .weekday.sun{ color: var(--morandi-rose); }

  .days{
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
  }
  .day{
    position: relative;
    aspect-ratio: 1 / 1.05;
    border-radius: var(--radius-md);
    background: var(--morandi-paper);
    border: 1px solid transparent;
    padding: 10px 12px;
    cursor: pointer;
    transition: all .25s var(--ease);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    overflow: hidden;
  }
  .day.empty{
    background: transparent;
    cursor: default;
    pointer-events: none;
  }
  .day:hover{
    transform: translateY(-2px);
    background: #fff;
    border-color: var(--morandi-blue-soft);
    box-shadow: 0 10px 24px rgba(107,132,151,.12);
  }
  .day-num{
    font-size: 16px;
    font-weight: 500;
    color: var(--morandi-ink);
    letter-spacing: .5px;
  }
  .day.sun .day-num{ color: var(--morandi-rose); }
  .day.today{
    background: linear-gradient(160deg, var(--morandi-blue-mist) 0%, #fff 80%);
    border-color: var(--morandi-blue-soft);
  }
  .day.today .day-num{
    color: var(--morandi-blue-deep);
    font-weight: 700;
  }
  .day.has-booking .badge{
    display: flex;
  }
  .badge{
    display: none;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: var(--morandi-blue-deep);
    background: rgba(143,168,184,.18);
    padding: 3px 8px;
    border-radius: 999px;
    width: fit-content;
    letter-spacing: .5px;
  }
  .dot{
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--morandi-blue-deep);
    display: inline-block;
  }

  /* --- 底部提示 --- */
  .legend{
    margin-top: 22px;
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    font-size: 12px;
    color: var(--morandi-ink-soft);
    letter-spacing: 1px;
  }
  .legend-item{ display: flex; align-items: center; gap: 6px; }
  .legend .dot{ width: 8px; height: 8px; }
  .legend .swatch-today{
    width: 14px; height: 14px;
    border-radius: 4px;
    background: linear-gradient(160deg, var(--morandi-blue-mist) 0%, #fff 80%);
    border: 1px solid var(--morandi-blue-soft);
  }

  /* --- 遮罩與 Modal --- */
  .overlay{
    position: fixed; inset: 0;
    background: rgba(63,74,82,.35);
    backdrop-filter: blur(4px);
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s var(--ease);
    z-index: 50;
  }
  .overlay.open{
    opacity: 1;
    pointer-events: auto;
  }

  .modal{
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -48%) scale(.96);
    width: min(520px, calc(100vw - 32px));
    max-height: 88vh;
    overflow-y: auto;
    background: var(--morandi-paper);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-modal);
    padding: 28px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s var(--ease), transform .35s var(--ease);
    z-index: 60;
  }
  .modal.open{
    opacity: 1;
    pointer-events: auto;
    transform: translate(-50%, -50%) scale(1);
  }
  .modal-head{
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 22px;
    gap: 12px;
  }
  .modal-title{
    margin: 0;
    font-size: 18px;
    font-weight: 500;
    color: var(--morandi-ink);
    letter-spacing: 1px;
  }
  .modal-sub{
    margin: 4px 0 0;
    font-size: 13px;
    color: var(--morandi-ink-soft);
    letter-spacing: 1px;
  }
  .close-btn{
    width: 34px; height: 34px;
    border-radius: 10px;
    background: transparent;
    border: 1px solid var(--morandi-gray-soft);
    color: var(--morandi-ink-soft);
    cursor: pointer;
    display: grid; place-items: center;
    transition: all .2s var(--ease);
  }
  .close-btn:hover{
    background: var(--morandi-blue-mist);
    color: var(--morandi-blue-deep);
    border-color: var(--morandi-blue-soft);
  }

  /* --- 既有預約列表 --- */
  .existing{
    margin-bottom: 22px;
  }
  .existing h4{
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--morandi-ink-soft);
    margin: 0 0 10px;
    font-weight: 500;
  }
  .booking-item{
    background: #fff;
    border: 1px solid var(--morandi-blue-mist);
    border-radius: var(--radius-md);
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    transition: all .2s var(--ease);
  }
  .booking-item:hover{
    border-color: var(--morandi-blue-soft);
    box-shadow: var(--shadow-card);
  }
  .booking-info .name{
    font-weight: 500;
    color: var(--morandi-ink);
    margin-bottom: 4px;
  }
  .booking-info .meta{
    font-size: 12px;
    color: var(--morandi-ink-soft);
    letter-spacing: .5px;
  }
  .booking-info .tags{
    margin-top: 6px;
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }
  .tag{
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--morandi-blue-mist);
    color: var(--morandi-blue-deep);
    letter-spacing: .5px;
  }
  .del-btn{
    background: transparent;
    border: none;
    color: var(--morandi-rose);
    cursor: pointer;
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 8px;
    transition: all .2s var(--ease);
    letter-spacing: 1px;
  }
  .del-btn:hover{
    background: rgba(198,169,161,.15);
  }
  .empty-state{
    text-align: center;
    padding: 12px;
    color: var(--morandi-ink-soft);
    font-size: 13px;
    letter-spacing: 1px;
  }

  .divider{
    height: 1px;
    background: var(--morandi-blue-mist);
    margin: 22px 0;
    opacity: .7;
  }

  /* --- 表單 --- */
  .form-group{
    margin-bottom: 18px;
  }
  .form-group label{
    display: block;
    font-size: 12px;
    color: var(--morandi-ink-soft);
    margin-bottom: 8px;
    letter-spacing: 2px;
    font-weight: 500;
  }
  .input, .select{
    width: 100%;
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--morandi-gray-soft);
    background: #fff;
    color: var(--morandi-ink);
    font-size: 14px;
    font-family: inherit;
    transition: all .2s var(--ease);
    letter-spacing: .5px;
  }
  .input:focus, .select:focus{
    outline: none;
    border-color: var(--morandi-blue);
    box-shadow: 0 0 0 4px rgba(143,168,184,.18);
  }
  .time-row{
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 10px;
    align-items: center;
  }
  .time-row .sep{
    color: var(--morandi-ink-soft);
    font-size: 14px;
  }

  /* checkbox 自製 */
  .check-grid{
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  .check{
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--morandi-gray-soft);
    background: #fff;
    cursor: pointer;
    transition: all .2s var(--ease);
    user-select: none;
    font-size: 14px;
  }
  .check input{ display: none; }
  .check .box{
    width: 18px; height: 18px;
    border-radius: 6px;
    border: 1.5px solid var(--morandi-gray);
    display: grid; place-items: center;
    flex-shrink: 0;
    transition: all .2s var(--ease);
    background: #fff;
  }
  .check .box::after{
    content: "";
    width: 9px; height: 5px;
    border-left: 2px solid #fff;
    border-bottom: 2px solid #fff;
    transform: rotate(-45deg) translateY(-1px);
    opacity: 0;
    transition: opacity .2s var(--ease);
  }
  .check input:checked + .box{
    background: var(--morandi-blue);
    border-color: var(--morandi-blue);
  }
  .check input:checked + .box::after{ opacity: 1; }
  .check:hover{
    border-color: var(--morandi-blue-soft);
    background: var(--morandi-blue-mist);
  }
  .check input:checked ~ .label{
    color: var(--morandi-blue-deep);
    font-weight: 500;
  }

  /* 按鈕 */
  .actions{
    display: flex;
    gap: 10px;
    margin-top: 24px;
  }
  .btn{
    flex: 1;
    padding: 13px 18px;
    border-radius: var(--radius-sm);
    border: none;
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
    letter-spacing: 2px;
    transition: all .25s var(--ease);
    font-weight: 500;
  }
  .btn-ghost{
    background: transparent;
    color: var(--morandi-ink-soft);
    border: 1px solid var(--morandi-gray-soft);
  }
  .btn-ghost:hover{
    background: var(--morandi-blue-mist);
    color: var(--morandi-blue-deep);
    border-color: var(--morandi-blue-soft);
  }
  .btn-primary{
    background: linear-gradient(135deg, var(--morandi-blue) 0%, var(--morandi-blue-deep) 100%);
    color: #fff;
    box-shadow: 0 8px 20px rgba(107,132,151,.30);
  }
  .btn-primary:hover{
    transform: translateY(-2px);
    box-shadow: 0 12px 26px rgba(107,132,151,.40);
  }
  .btn-primary:active{ transform: translateY(0); }

  /* 訊息提示 */
  .toast{
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translate(-50%, 20px);
    background: var(--morandi-ink);
    color: #fff;
    padding: 12px 20px;
    border-radius: 12px;
    font-size: 13px;
    letter-spacing: 1px;
    box-shadow: var(--shadow-modal);
    opacity: 0;
    pointer-events: none;
    transition: all .3s var(--ease);
    z-index: 80;
  }
  .toast.show{
    opacity: 1;
    transform: translate(-50%, 0);
  }
  .toast.error{ background: var(--morandi-rose); }

  /* --- RWD --- */
  @media (max-width: 768px){
    .app{ padding: 28px 16px 60px; }
    .card{ padding: 18px; }
    .cal-title{ font-size: 20px; }
    .cal-title .year{ font-size: 12px; }
    .weekdays, .days{ gap: 5px; }
    .weekday{ font-size: 11px; padding: 6px 0; letter-spacing: 1px; }
    .day{
      padding: 6px 7px;
      aspect-ratio: 1 / 1.1;
      border-radius: 10px;
    }
    .day-num{ font-size: 14px; }
    .badge{ font-size: 9px; padding: 2px 5px; }
    .badge span:not(.dot){ display: none; }
    .header{ flex-direction: column; align-items: flex-start; }
    .check-grid{ grid-template-columns: 1fr; }

    /* 手機改 bottom sheet */
    .modal{
      top: auto; left: 0;
      bottom: 0;
      transform: translate(0, 100%);
      width: 100%;
      max-height: 92vh;
      border-radius: 24px 24px 0 0;
      padding: 22px 18px 28px;
    }
    .modal.open{
      transform: translate(0, 0);
    }
    .modal::before{
      content: "";
      display: block;
      width: 40px; height: 4px;
      background: var(--morandi-gray-soft);
      border-radius: 4px;
      margin: -4px auto 14px;
    }
  }

  @media (min-width: 769px) and (max-width: 1023px){
    .app{ padding: 36px 24px; }
  }

  /* 滾動條 */
  .modal::-webkit-scrollbar{ width: 6px; }
  .modal::-webkit-scrollbar-thumb{
    background: var(--morandi-blue-soft);
    border-radius: 3px;
  }
</style>
</head>
<body>
  <div class="app">

    <header class="header">
      <div class="brand">
        <div class="brand-mark">M</div>
        <div>
          <h1>預約日曆</h1>
          <p>MORANDI · BOOKING</p>
        </div>
      </div>
      <div class="today-chip" id="todayChip">—</div>
    </header>

    <section class="card">
      <div class="cal-head">
        <div class="cal-title">
          <span id="monthLabel">—月</span>
          <span class="year" id="yearLabel">2026</span>
        </div>
        <div class="cal-nav">
          <button class="nav-btn today-btn" id="todayBtn">今 日</button>
          <button class="nav-btn" id="prevBtn" aria-label="上個月">‹</button>
          <button class="nav-btn" id="nextBtn" aria-label="下個月">›</button>
        </div>
      </div>

      <div class="weekdays" id="weekdays"></div>
      <div class="days" id="days"></div>

      <div class="legend">
        <div class="legend-item"><span class="swatch-today"></span><span>今天</span></div>
        <div class="legend-item"><span class="dot"></span><span>已有預約</span></div>
        <div class="legend-item"><span style="color:var(--morandi-rose)">●</span><span>週日</span></div>
      </div>
    </section>
  </div>

  <!-- 遮罩 & Modal -->
  <div class="overlay" id="overlay"></div>

  <div class="modal" id="modal" role="dialog" aria-modal="true">
    <div class="modal-head">
      <div>
        <h3 class="modal-title" id="modalDate">—</h3>
        <p class="modal-sub" id="modalSub">新增與管理當日預約</p>
      </div>
      <button class="close-btn" id="closeBtn" aria-label="關閉">✕</button>
    </div>

    <div class="existing">
      <h4>當日預約</h4>
      <div id="bookingList"></div>
    </div>

    <div class="divider"></div>

    <form id="bookingForm" autocomplete="off">
      <div class="form-group">
        <label for="nameInput">預約人姓名</label>
        <input class="input" type="text" id="nameInput" placeholder="請輸入預約人姓名" required />
      </div>

      <div class="form-group">
        <label>預約時段</label>
        <div class="time-row">
          <select class="select" id="startTime" required></select>
          <span class="sep">—</span>
          <select class="select" id="endTime" required></select>
        </div>
      </div>

      <div class="form-group">
        <label>聯絡方式（可複選）</label>
        <div class="check-grid">
          <label class="check">
            <input type="checkbox" value="LINE 官方" />
            <span class="box"></span>
            <span class="label">LINE 官方</span>
          </label>
          <label class="check">
            <input type="checkbox" value="電話" checked />
            <span class="box"></span>
            <span class="label">電話</span>
          </label>
          <label class="check">
            <input type="checkbox" value="臉書" />
            <span class="box"></span>
            <span class="label">臉書</span>
          </label>
          <label class="check">
            <input type="checkbox" value="現場" />
            <span class="box"></span>
            <span class="label">現場</span>
          </label>
        </div>
      </div>

      <div class="actions">
        <button type="button" class="btn btn-ghost" id="cancelBtn">取 消</button>
        <button type="submit" class="btn btn-primary">確認送出</button>
      </div>
    </form>
  </div>

  <div class="toast" id="toast"></div>

<script>
(() => {
  "use strict";

  const STORAGE_KEY = "morandi_bookings_v1";
  const WEEKDAYS = ["日","一","二","三","四","五","六"];
  const MONTH_NAMES = ["一月","二月","三月","四月","五月","六月","七月","八月","九月","十月","十一月","十二月"];

  /* ---------- DOM ---------- */
  const $ = (id) => document.getElementById(id);
  const monthLabel = $("monthLabel");
  const yearLabel  = $("yearLabel");
  const weekdaysEl = $("weekdays");
  const daysEl     = $("days");
  const todayChip  = $("todayChip");

  const overlay    = $("overlay");
  const modal      = $("modal");
  const modalDate  = $("modalDate");
  const modalSub   = $("modalSub");
  const closeBtn   = $("closeBtn");
  const cancelBtn  = $("cancelBtn");

  const form       = $("bookingForm");
  const nameInput  = $("nameInput");
  const startTime  = $("startTime");
  const endTime    = $("endTime");
  const bookingList= $("bookingList");
  const toast      = $("toast");

  /* ---------- 狀態 ---------- */
  const now = new Date();
  let viewYear  = now.getFullYear();
  let viewMonth = now.getMonth(); // 0-11
  let selectedDateKey = null;     // "YYYY-MM-DD"

  /* ---------- 儲存 ---------- */
  function loadAll() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
    } catch { return {}; }
  }
  function saveAll(data) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }
  function getBookings(key) {
    const all = loadAll();
    return all[key] || [];
  }
  function addBooking(key, b) {
    const all = loadAll();
    if (!all[key]) all[key] = [];
    all[key].push(b);
    all[key].sort((a,b) => a.start.localeCompare(b.start));
    saveAll(all);
  }
  function deleteBooking(key, id) {
    const all = loadAll();
    if (!all[key]) return;
    all[key] = all[key].filter(b => b.id !== id);
    if (all[key].length === 0) delete all[key];
    saveAll(all);
  }

  /* ---------- 工具 ---------- */
  function pad(n){ return String(n).padStart(2, "0"); }
  function dateKey(y, m, d){ return `${y}-${pad(m+1)}-${pad(d)}`; }
  function isSameDay(a, b){
    return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
  }
  function showToast(msg, type="ok"){
    toast.textContent = msg;
    toast.classList.toggle("error", type === "error");
    toast.classList.add("show");
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => toast.classList.remove("show"), 2200);
  }

  /* ---------- 月曆渲染 ---------- */
  function renderWeekdays(){
    weekdaysEl.innerHTML = WEEKDAYS.map((w, i) =>
      `<div class="weekday${i===0?" sun":""}">${w}</div>`
    ).join("");
  }

  function renderCalendar(){
    monthLabel.textContent = MONTH_NAMES[viewMonth];
    yearLabel.textContent  = viewYear;

    const firstDay   = new Date(viewYear, viewMonth, 1).getDay(); // 0=Sun
    const daysInMon  = new Date(viewYear, viewMonth + 1, 0).getDate();
    const today      = new Date();

    let html = "";
    for (let i = 0; i < firstDay; i++){
      html += `<div class="day empty"></div>`;
    }
    for (let d = 1; d <= daysInMon; d++){
      const dObj = new Date(viewYear, viewMonth, d);
      const dow  = dObj.getDay();
      const key  = dateKey(viewYear, viewMonth, d);
      const bookings = getBookings(key);
      const hasBooking = bookings.length > 0;
      const cls = [
        "day",
        dow === 0 ? "sun" : "",
        isSameDay(dObj, today) ? "today" : "",
        hasBooking ? "has-booking" : ""
      ].filter(Boolean).join(" ");

      html += `
        <div class="${cls}" data-key="${key}">
          <div class="day-num">${d}</div>
          <div class="badge"><span class="dot"></span><span>${bookings.length} 筆</span></div>
        </div>
      `;
    }
    daysEl.innerHTML = html;

    daysEl.querySelectorAll(".day:not(.empty)").forEach(el => {
      el.addEventListener("click", () => openModal(el.dataset.key));
    });
  }

  /* ---------- 時間下拉 ---------- */
  function buildTimeOptions(selectEl, defVal){
    let opts = "";
    for (let h = 0; h < 24; h++){
      for (let m = 0; m < 60; m += 5){
        const v = `${pad(h)}:${pad(m)}`;
        opts += `<option value="${v}"${v===defVal?" selected":""}>${v}</option>`;
      }
    }
    selectEl.innerHTML = opts;
  }

  /* ---------- Modal ---------- */
  function openModal(key){
    selectedDateKey = key;
    const [y, m, d] = key.split("-").map(Number);
    const dObj = new Date(y, m-1, d);
    const wk = WEEKDAYS[dObj.getDay()];
    modalDate.textContent = `${y} / ${pad(m)} / ${pad(d)}（週${wk}）`;
    modalSub.textContent  = "新增與管理當日預約";

    buildTimeOptions(startTime, "10:00");
    buildTimeOptions(endTime,   "11:00");

    form.reset();
    form.querySelectorAll(".check input").forEach(cb => {
      cb.checked = (cb.value === "電話");
    });
    startTime.value = "10:00";
    endTime.value   = "11:00";

    renderBookingList();

    overlay.classList.add("open");
    modal.classList.add("open");
    document.body.style.overflow = "hidden";
    setTimeout(() => nameInput.focus(), 280);
  }

  function closeModal(){
    overlay.classList.remove("open");
    modal.classList.remove("open");
    document.body.style.overflow = "";
    selectedDateKey = null;
  }

  function renderBookingList(){
    const list = getBookings(selectedDateKey);
    if (list.length === 0){
      bookingList.innerHTML = `<div class="empty-state">這天還沒有預約，新增一筆吧。</div>`;
      return;
    }
    bookingList.innerHTML = list.map(b => `
      <div class="booking-item">
        <div class="booking-info">
          <div class="name">${escapeHTML(b.name)}</div>
          <div class="meta">${b.start} — ${b.end}</div>
          <div class="tags">${b.contacts.map(c => `<span class="tag">${escapeHTML(c)}</span>`).join("")}</div>
        </div>
        <button class="del-btn" data-id="${b.id}">刪 除</button>
      </div>
    `).join("");

    bookingList.querySelectorAll(".del-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        deleteBooking(selectedDateKey, btn.dataset.id);
        renderBookingList();
        renderCalendar();
        showToast("已刪除預約");
      });
    });
  }

  function escapeHTML(s){
    return String(s).replace(/[&<>"']/g, c => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
    })[c]);
  }

  /* ---------- 表單送出 ---------- */
  form.addEventListener("submit", (e) => {
    e.preventDefault();
    const name = nameInput.value.trim();
    const s = startTime.value;
    const en = endTime.value;
    const contacts = Array.from(form.querySelectorAll(".check input:checked")).map(cb => cb.value);

    if (!name){ showToast("請輸入預約人姓名", "error"); return; }
    if (s >= en){ showToast("結束時間需晚於開始時間", "error"); return; }
    if (contacts.length === 0){ showToast("請至少選擇一種聯絡方式", "error"); return; }

    addBooking(selectedDateKey, {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
      name, start: s, end: en, contacts,
      createdAt: new Date().toISOString()
    });

    showToast("預約已建立");
    form.reset();
    form.querySelectorAll(".check input").forEach(cb => cb.checked = (cb.value === "電話"));
    startTime.value = "10:00";
    endTime.value   = "11:00";
    renderBookingList();
    renderCalendar();
  });

  /* ---------- 控制列 ---------- */
  $("prevBtn").addEventListener("click", () => {
    viewMonth--;
    if (viewMonth < 0){ viewMonth = 11; viewYear--; }
    renderCalendar();
  });
  $("nextBtn").addEventListener("click", () => {
    viewMonth++;
    if (viewMonth > 11){ viewMonth = 0; viewYear++; }
    renderCalendar();
  });
  $("todayBtn").addEventListener("click", () => {
    const t = new Date();
    viewYear = t.getFullYear();
    viewMonth = t.getMonth();
    renderCalendar();
  });

  overlay.addEventListener("click", closeModal);
  closeBtn.addEventListener("click", closeModal);
  cancelBtn.addEventListener("click", closeModal);
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && modal.classList.contains("open")) closeModal();
  });

  /* ---------- 初始化 ---------- */
  function init(){
    const t = new Date();
    todayChip.textContent = `今天 · ${t.getFullYear()} / ${pad(t.getMonth()+1)} / ${pad(t.getDate())}`;
    renderWeekdays();
    renderCalendar();
  }
  init();

})();
</script>
</body>
</html>
