<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>品洛預約日期</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet" />
<style>
  :root{
    /* 莫蘭迪色系 */
    --morandi-blue:        #8FA8B8;
    --morandi-blue-deep:   #6B8497;
    --morandi-blue-soft:   #B7C7D1;
    --morandi-blue-mist:   #DCE5EB;
    --morandi-cream:       #F5F1EA;
    --morandi-paper:       #FBF9F5;
    --morandi-gray:        #A8A7A1;
    --morandi-gray-soft:   #D8D5CE;
    --morandi-ink:         #3F4A52;
    --morandi-ink-soft:    #6D7780;
    --morandi-rose:        #C6A9A1;
    --morandi-accent:      #93AFA0;

    --shadow-soft: 0 8px 30px rgba(107, 132, 151, 0.10), 0 2px 6px rgba(63, 74, 82, 0.04);
    --shadow-card: 0 4px 16px rgba(107, 132, 151, 0.08);
    --shadow-modal: 0 24px 60px rgba(63, 74, 82, 0.18);

    --radius-sm: 10px;
    --radius-md: 16px;
    --radius-lg: 24px;

    --ease: cubic-bezier(.22,.61,.36,1);
  }

  *{ box-sizing: border-box; }

  html, body{
    margin: 0;
    padding: 0;
    background:
      radial-gradient(1200px 600px at 10% -10%, #E7EEF2 0%, transparent 60%),
      radial-gradient(900px 500px at 110% 10%, #EDE6DC 0%, transparent 55%),
      var(--morandi-paper);
    color: var(--morandi-ink);
    font-family: "DM Sans", "Noto Sans TC", -apple-system, "PingFang TC", "Microsoft JhengHei", sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }

  .app{
    max-width: 1080px;
    margin: 0 auto;
    padding: 48px 28px 80px;
  }

  /* --- 頁首 --- */
  .header{
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 32px;
  }
  .brand{
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .brand-mark{
    width: 44px; height: 44px;
    border-radius: 14px;
    background: linear-gradient(135deg, var(--morandi-blue) 0%, var(--morandi-blue-deep) 100%);
    display: grid; place-items: center;
    color: #fff;
    font-weight: 700;
    box-shadow: var(--shadow-card);
    letter-spacing: .5px;
  }
  .brand h1{
    font-size: 22px;
    margin: 0;
    font-weight: 500;
    letter-spacing: .5px;
  }
  .brand p{
    margin: 4px 0 0;
    font-size: 13px;
    color: var(--morandi-ink-soft);
    letter-spacing: 1px;
  }
  .today-chip{
    background: #fff;
    border: 1px solid var(--morandi-blue-mist);
    color: var(--morandi-ink-soft);
    padding: 10px 16px;
    border-radius: 999px;
    font-size: 13px;
    box-shadow: var(--shadow-card);
    letter-spacing: .5px;
  }

  /* --- 卡片 --- */
  .card{
    background: #fff;
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-soft);
    padding: 28px;
  }

  /* --- 月曆控制列 --- */
  .cal-head{
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 22px;
    gap: 10px;
  }
  .cal-title{
    font-size: 26px;
    font-weight: 500;
    color: var(--morandi-ink);
    letter-spacing: 1px;
    display: flex;
    align-items: baseline;
    gap: 10px;
  }
  .cal-title .year{
    font-size: 14px;
    color: var(--morandi-ink-soft);
    font-weight: 400;
    letter-spacing: 2px;
  }
  .cal-nav{
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .nav-btn{
    width: 40px; height: 40px;
    border-radius: 12px;
    border: 1px solid var(--morandi-blue-mist);
    background: #fff;
    color: var(--morandi-blue-deep);
    cursor: pointer;
    display: grid; place-items: center;
    transition: all .25s var(--ease);
    font-size: 16px;
  }
  .nav-btn:hover{
    background: var(--morandi-blue);
    color: #fff;
    border-color: var(--morandi-blue);
    transform: translateY(-1px);
    box-shadow: 0 6px 16px rgba(143,168,184,.35);
  }
  .nav-btn:active{ transform: translateY(0); }
  .today-btn{
    width: auto;
    padding: 0 16px;
    font-size: 13px;
    letter-spacing: 1px;
  }

  /* --- 月曆網格 --- */
  .weekdays{
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
    margin-bottom: 10px;
  }
  .weekday{
    text-align: center;
    font-size: 12px;
    color: var(--morandi-ink-soft);
    letter-spacing: 2px;
    padding: 8px 0;
    font-weight: 500;
  }
  .weekday.sun{ color: var(--morandi-rose); }

  .days{
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
    transition: opacity .25s var(--ease);
  }
  .days.loading{
    opacity: .45;
    pointer-events: none;
  }
  .day{
    position: relative;
    aspect-ratio: 1 / 1.05;
    border-radius: var(--radius-md);
    background: var(--morandi-paper);
    border: 1px solid transparent;
    padding: 10px 12px;
    cursor: pointer;
    transition: all .25s var(--ease);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    overflow: hidden;
  }
  .day.empty{
    background: transparent;
    cursor: default;
    pointer-events: none;
  }
  .day:hover{
    transform: translateY(-2px);
    background: #fff;
    border-color: var(--morandi-blue-soft);
    box-shadow: 0 10px 24px rgba(107,132,151,.12);
  }
  .day-num{
    font-size: 16px;
    font-weight: 500;
    color: var(--morandi-ink);
    letter-spacing: .5px;
  }
  .day.sun .day-num{ color: var(--morandi-rose); }
  .day.today{
    background: linear-gradient(160deg, var(--morandi-blue-mist) 0%, #fff 80%);
    border-color: var(--morandi-blue-soft);
  }
  .day.today .day-num{
    color: var(--morandi-blue-deep);
    font-weight: 700;
  }
  .day.has-booking .badge{
    display: flex;
  }
  .badge{
    display: none;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: var(--morandi-blue-deep);
    background: rgba(143,168,184,.18);
    padding: 3px 8px;
    border-radius: 999px;
    width: fit-content;
    letter-spacing: .5px;
  }
  .dot{
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--morandi-blue-deep);
    display: inline-block;
  }

  /* --- 底部提示 --- */
  .legend{
    margin-top: 22px;
    display: flex;
    gap: 18px;
    flex-wrap: wrap;
    font-size: 12px;
    color: var(--morandi-ink-soft);
    letter-spacing: 1px;
  }
  .legend-item{ display: flex; align-items: center; gap: 6px; }
  .legend .dot{ width: 8px; height: 8px; }
  .legend .swatch-today{
    width: 14px; height: 14px;
    border-radius: 4px;
    background: linear-gradient(160deg, var(--morandi-blue-mist) 0%, #fff 80%);
    border: 1px solid var(--morandi-blue-soft);
  }

  /* --- 遮罩與 Modal --- */
  .overlay{
    position: fixed; inset: 0;
    background: rgba(63,74,82,.35);
    backdrop-filter: blur(4px);
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s var(--ease);
    z-index: 50;
  }
  .overlay.open{
    opacity: 1;
    pointer-events: auto;
  }

  .modal{
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -48%) scale(.96);
    width: min(520px, calc(100vw - 32px));
    max-height: 88vh;
    overflow-y: auto;
    background: var(--morandi-paper);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-modal);
    padding: 28px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .3s var(--ease), transform .35s var(--ease);
    z-index: 60;
  }
  .modal.open{
    opacity: 1;
    pointer-events: auto;
    transform: translate(-50%, -50%) scale(1);
  }
  .modal-head{
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    margin-bottom: 22px;
    gap: 12px;
  }
  .modal-title{
    margin: 0;
    font-size: 18px;
    font-weight: 500;
    color: var(--morandi-ink);
    letter-spacing: 1px;
  }
  .modal-sub{
    margin: 4px 0 0;
    font-size: 13px;
    color: var(--morandi-ink-soft);
    letter-spacing: 1px;
  }
  .close-btn{
    width: 34px; height: 34px;
    border-radius: 10px;
    background: transparent;
    border: 1px solid var(--morandi-gray-soft);
    color: var(--morandi-ink-soft);
    cursor: pointer;
    display: grid; place-items: center;
    transition: all .2s var(--ease);
  }
  .close-btn:hover{
    background: var(--morandi-blue-mist);
    color: var(--morandi-blue-deep);
    border-color: var(--morandi-blue-soft);
  }

  /* --- 既有預約列表 --- */
  .existing{
    margin-bottom: 8px;
  }
  .existing-head{
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 0 0 12px;
  }
  .existing h4{
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--morandi-ink-soft);
    margin: 0;
    font-weight: 500;
  }
  .count-chip{
    font-size: 11px;
    letter-spacing: 1px;
    background: var(--morandi-blue-mist);
    color: var(--morandi-blue-deep);
    padding: 2px 8px;
    border-radius: 999px;
    min-width: 22px;
    text-align: center;
  }
  .booking-item{
    background: #fff;
    border: 1px solid var(--morandi-blue-mist);
    border-radius: var(--radius-md);
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    transition: all .2s var(--ease);
  }
  .booking-item:hover{
    border-color: var(--morandi-blue-soft);
    box-shadow: var(--shadow-card);
  }
  .booking-info .name{
    font-weight: 500;
    color: var(--morandi-ink);
    margin-bottom: 4px;
  }
  .booking-info .meta{
    font-size: 12px;
    color: var(--morandi-ink-soft);
    letter-spacing: .5px;
  }
  .booking-info .rolls{
    margin-top: 6px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--morandi-blue-deep);
    background: linear-gradient(135deg, var(--morandi-blue-mist) 0%, #fff 100%);
    border: 1px solid var(--morandi-blue-soft);
    padding: 4px 10px;
    border-radius: 999px;
    letter-spacing: .5px;
    font-weight: 500;
  }
  .booking-info .rolls .roll-ico{ font-size: 13px; }
  .booking-info .rolls .split{ color: var(--morandi-ink-soft); font-weight: 400; }
  .booking-info .tags{
    margin-top: 6px;
    display: flex;
    gap: 4px;
    flex-wrap: wrap;
  }
  .tag{
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--morandi-blue-mist);
    color: var(--morandi-blue-deep);
    letter-spacing: .5px;
  }
  .booking-info .note{
    margin-top: 8px;
    padding: 8px 10px;
    background: var(--morandi-paper);
    border-left: 3px solid var(--morandi-blue-soft);
    border-radius: 6px;
    font-size: 12px;
    color: var(--morandi-ink-soft);
    line-height: 1.55;
    letter-spacing: .3px;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .item-actions{
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex-shrink: 0;
  }
  .edit-btn, .del-btn{
    background: transparent;
    border: none;
    cursor: pointer;
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 8px;
    transition: all .2s var(--ease);
    letter-spacing: 1px;
    font-family: inherit;
  }
  .edit-btn{ color: var(--morandi-blue-deep); }
  .edit-btn:hover{ background: var(--morandi-blue-mist); }
  .del-btn{ color: var(--morandi-rose); }
  .del-btn:hover{ background: rgba(198,169,161,.15); }

  .empty-state{
    text-align: center;
    padding: 18px 12px;
    color: var(--morandi-ink-soft);
    font-size: 13px;
    letter-spacing: 1px;
    background: var(--morandi-paper);
    border: 1px dashed var(--morandi-gray-soft);
    border-radius: var(--radius-md);
  }

  /* 新增預約按鈕（觸發顯示表單） */
  .btn-add{
    width: 100%;
    margin-top: 12px;
    padding: 13px 16px;
    background: #fff;
    border: 1.5px dashed var(--morandi-blue-soft);
    color: var(--morandi-blue-deep);
    border-radius: var(--radius-md);
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
    letter-spacing: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all .25s var(--ease);
  }
  .btn-add:hover{
    background: var(--morandi-blue-mist);
    border-color: var(--morandi-blue);
    border-style: solid;
    transform: translateY(-1px);
  }
  .btn-add .plus{
    font-size: 18px;
    line-height: 1;
    font-weight: 300;
  }

  /* 表單面板開合 */
  .form-panel.hidden,
  .divider.hidden,
  .btn-add.hidden{ display: none !important; }

  .form-head{
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 18px;
  }
  .form-head h4{
    font-size: 13px;
    letter-spacing: 2px;
    color: var(--morandi-blue-deep);
    margin: 0;
    font-weight: 500;
  }
  .form-head::before{
    content: "";
    width: 3px;
    height: 14px;
    background: var(--morandi-blue);
    border-radius: 2px;
  }

  .divider{
    height: 1px;
    background: var(--morandi-blue-mist);
    margin: 22px 0;
    opacity: .7;
  }

  /* --- 表單 --- */
  .form-group{
    margin-bottom: 18px;
  }
  .form-group label{
    display: block;
    font-size: 12px;
    color: var(--morandi-ink-soft);
    margin-bottom: 8px;
    letter-spacing: 2px;
    font-weight: 500;
  }
  .form-group label .optional{
    color: var(--morandi-gray);
    font-size: 11px;
    letter-spacing: 1px;
    margin-left: 2px;
    font-weight: 400;
  }
  .input, .select{
    width: 100%;
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--morandi-gray-soft);
    background: #fff;
    color: var(--morandi-ink);
    font-size: 14px;
    font-family: inherit;
    transition: all .2s var(--ease);
    letter-spacing: .5px;
  }
  .textarea{
    resize: vertical;
    min-height: 72px;
    line-height: 1.6;
  }
  .input:focus, .select:focus{
    outline: none;
    border-color: var(--morandi-blue);
    box-shadow: 0 0 0 4px rgba(143,168,184,.18);
  }
  .time-row{
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 10px;
    align-items: center;
  }
  .time-row .sep{
    color: var(--morandi-ink-soft);
    font-size: 14px;
  }

  /* 狀態 pill（預約時段下方） */
  .status-row{
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }
  .status-pill{
    flex: 1;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 8px 12px;
    background: #fff;
    border: 1px solid var(--morandi-gray-soft);
    border-radius: 999px;
    font-size: 13px;
    color: var(--morandi-ink-soft);
    cursor: pointer;
    transition: all .2s var(--ease);
    user-select: none;
    letter-spacing: 1px;
  }
  .status-pill input{ display: none; }
  .status-pill .dot{
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--morandi-gray-soft);
    transition: all .2s var(--ease);
  }
  .status-pill[data-status="confirmed"]:has(input:checked){
    background: rgba(147,175,160,.18);
    border-color: var(--morandi-accent);
    color: #4f6a5a;
    font-weight: 500;
  }
  .status-pill[data-status="confirmed"]:has(input:checked) .dot{
    background: var(--morandi-accent);
    box-shadow: 0 0 0 3px rgba(147,175,160,.25);
  }
  .status-pill[data-status="pending"]:has(input:checked){
    background: rgba(198,169,161,.18);
    border-color: var(--morandi-rose);
    color: #8a6a62;
    font-weight: 500;
  }
  .status-pill[data-status="pending"]:has(input:checked) .dot{
    background: var(--morandi-rose);
    box-shadow: 0 0 0 3px rgba(198,169,161,.25);
  }
  .status-pill:hover{ border-color: var(--morandi-blue-soft); }

  /* 列表上的狀態徽章 */
  .status-badge{
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 10.5px;
    padding: 2px 8px;
    border-radius: 999px;
    margin-left: 8px;
    letter-spacing: 1px;
    font-weight: 500;
    vertical-align: middle;
  }
  .status-badge::before{
    content: "";
    width: 6px; height: 6px;
    border-radius: 50%;
    display: inline-block;
  }
  .status-badge.confirmed{
    background: rgba(147,175,160,.18);
    color: #4f6a5a;
    border: 1px solid rgba(147,175,160,.4);
  }
  .status-badge.confirmed::before{ background: var(--morandi-accent); }
  .status-badge.pending{
    background: rgba(198,169,161,.18);
    color: #8a6a62;
    border: 1px solid rgba(198,169,161,.4);
  }
  .status-badge.pending::before{ background: var(--morandi-rose); }

  /* checkbox 自製 */
  .check-grid{
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }
  .check{
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--morandi-gray-soft);
    background: #fff;
    cursor: pointer;
    transition: all .2s var(--ease);
    user-select: none;
    font-size: 14px;
  }
  .check input{ display: none; }
  .check .box{
    width: 18px; height: 18px;
    border-radius: 6px;
    border: 1.5px solid var(--morandi-gray);
    display: grid; place-items: center;
    flex-shrink: 0;
    transition: all .2s var(--ease);
    background: #fff;
  }
  .check .box::after{
    content: "";
    width: 9px; height: 5px;
    border-left: 2px solid #fff;
    border-bottom: 2px solid #fff;
    transform: rotate(-45deg) translateY(-1px);
    opacity: 0;
    transition: opacity .2s var(--ease);
  }
  .check input:checked + .box{
    background: var(--morandi-blue);
    border-color: var(--morandi-blue);
  }
  .check input:checked + .box::after{ opacity: 1; }
  .check:hover{
    border-color: var(--morandi-blue-soft);
    background: var(--morandi-blue-mist);
  }
  .check input:checked ~ .label{
    color: var(--morandi-blue-deep);
    font-weight: 500;
  }
  /* radio：圓形 + 中心小白點 */
  .check input[type="radio"] + .box{
    border-radius: 50%;
  }
  .check input[type="radio"] + .box::after{
    content: "";
    width: 8px; height: 8px;
    border: none;
    border-radius: 50%;
    background: #fff;
    transform: none;
  }

  /* 總捲數列 + 分袋按鈕 */
  .rolls-row{
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .rolls-input{ flex: 1; }
  .rolls-input.auto{
    background: var(--morandi-blue-mist);
    color: var(--morandi-blue-deep);
    cursor: not-allowed;
    font-weight: 500;
  }
  .btn-toggle{
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 12px 16px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--morandi-gray-soft);
    background: #fff;
    color: var(--morandi-ink-soft);
    cursor: pointer;
    font-family: inherit;
    font-size: 13px;
    letter-spacing: 1px;
    transition: all .2s var(--ease);
    white-space: nowrap;
  }
  .btn-toggle:hover{
    border-color: var(--morandi-blue-soft);
    color: var(--morandi-blue-deep);
  }
  .btn-toggle.active{
    background: var(--morandi-blue);
    border-color: var(--morandi-blue);
    color: #fff;
    box-shadow: 0 4px 12px rgba(107,132,151,.25);
  }
  .btn-toggle .bag-ico{ font-size: 14px; }

  /* 分袋明細區塊 */
  .bags-section{
    margin-top: 12px;
    padding: 14px;
    background: var(--morandi-paper);
    border: 1px dashed var(--morandi-blue-soft);
    border-radius: var(--radius-md);
  }
  .bags-head{
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .bags-title{
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--morandi-ink-soft);
    font-weight: 500;
  }
  .bags-sum{
    font-size: 12px;
    color: var(--morandi-ink-soft);
    letter-spacing: .5px;
    font-variant-numeric: tabular-nums;
  }
  .bags-sum.match{ color: var(--morandi-accent); }
  .bags-sum.mismatch{ color: var(--morandi-rose); }
  .bags-list{ display: flex; flex-direction: column; gap: 8px; }
  .bag-row{
    display: grid;
    grid-template-columns: 70px 1fr 32px;
    gap: 8px;
    align-items: center;
  }
  .bag-label{
    font-size: 13px;
    color: var(--morandi-ink);
    letter-spacing: 1px;
  }
  .bag-input{
    padding: 9px 12px;
    font-size: 14px;
  }
  .bag-del{
    width: 32px; height: 32px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: var(--morandi-rose);
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    transition: all .2s var(--ease);
  }
  .bag-del:hover{ background: rgba(198,169,161,.15); }
  .bag-del:disabled{ opacity: .3; cursor: not-allowed; }
  .btn-add-bag{
    margin-top: 10px;
    width: 100%;
    padding: 8px;
    border-radius: 8px;
    border: 1px dashed var(--morandi-gray-soft);
    background: transparent;
    color: var(--morandi-ink-soft);
    cursor: pointer;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 1px;
    transition: all .2s var(--ease);
  }
  .btn-add-bag:hover{
    border-color: var(--morandi-blue);
    color: var(--morandi-blue-deep);
    background: #fff;
  }

  /* 按鈕 */
  .actions{
    display: flex;
    gap: 10px;
    margin-top: 24px;
  }
  .btn{
    flex: 1;
    padding: 13px 18px;
    border-radius: var(--radius-sm);
    border: none;
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
    letter-spacing: 2px;
    transition: all .25s var(--ease);
    font-weight: 500;
  }
  .btn-ghost{
    background: transparent;
    color: var(--morandi-ink-soft);
    border: 1px solid var(--morandi-gray-soft);
  }
  .btn-ghost:hover{
    background: var(--morandi-blue-mist);
    color: var(--morandi-blue-deep);
    border-color: var(--morandi-blue-soft);
  }
  .btn-primary{
    background: linear-gradient(135deg, var(--morandi-blue) 0%, var(--morandi-blue-deep) 100%);
    color: #fff;
    box-shadow: 0 8px 20px rgba(107,132,151,.30);
  }
  .btn-primary:hover{
    transform: translateY(-2px);
    box-shadow: 0 12px 26px rgba(107,132,151,.40);
  }
  .btn-primary:active{ transform: translateY(0); }

  /* 訊息提示 */
  .toast{
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translate(-50%, 20px);
    background: var(--morandi-ink);
    color: #fff;
    padding: 12px 20px;
    border-radius: 12px;
    font-size: 13px;
    letter-spacing: 1px;
    box-shadow: var(--shadow-modal);
    opacity: 0;
    pointer-events: none;
    transition: all .3s var(--ease);
    z-index: 80;
  }
  .toast.show{
    opacity: 1;
    transform: translate(-50%, 0);
  }
  .toast.error{ background: var(--morandi-rose); }

  /* --- RWD --- */
  @media (max-width: 768px){
    .app{ padding: 28px 16px 60px; }
    .card{ padding: 18px; }
    .cal-title{ font-size: 20px; }
    .cal-title .year{ font-size: 12px; }
    .weekdays, .days{ gap: 5px; }
    .weekday{ font-size: 11px; padding: 6px 0; letter-spacing: 1px; }
    .day{
      padding: 6px 7px;
      aspect-ratio: 1 / 1.1;
      border-radius: 10px;
    }
    .day-num{ font-size: 14px; }
    .badge{ font-size: 9px; padding: 2px 5px; }
    .badge span:not(.dot){ display: none; }
    .header{ flex-direction: column; align-items: flex-start; }
    .check-grid{ grid-template-columns: 1fr; }

    /* 手機改 bottom sheet */
    .modal{
      top: auto; left: 0;
      bottom: 0;
      transform: translate(0, 100%);
      width: 100%;
      max-height: 92vh;
      max-height: 92dvh; /* 鍵盤彈出時自動縮，蓋住版面的機率較低 */
      border-radius: 24px 24px 0 0;
      padding: 22px 18px 28px;
    }
    .modal.open{
      transform: translate(0, 0);
    }
    .modal::before{
      content: "";
      display: block;
      width: 40px; height: 4px;
      background: var(--morandi-gray-soft);
      border-radius: 4px;
      margin: -4px auto 14px;
    }
    /* 鍵盤彈出時：給表單下方留足夠空間，textarea 才能被捲到可視範圍 */
    .modal.kb-up .form-panel{
      padding-bottom: 55vh;
    }
  }

  @media (min-width: 769px) and (max-width: 1023px){
    .app{ padding: 36px 24px; }
  }

  /* 滾動條 */
  .modal::-webkit-scrollbar{ width: 6px; }
  .modal::-webkit-scrollbar-thumb{
    background: var(--morandi-blue-soft);
    border-radius: 3px;
  }
</style>
</head>
<body>
  <div class="app">

    <header class="header">
      <div class="brand">
        <div class="brand-mark">M</div>
        <div>
          <h1>預約日曆</h1>
          <p>MORANDI · BOOKING</p>
        </div>
      </div>
      <div class="today-chip" id="todayChip">—</div>
    </header>

    <section class="card">
      <div class="cal-head">
        <div class="cal-title">
          <span id="monthLabel">—月</span>
          <span class="year" id="yearLabel">2026</span>
        </div>
        <div class="cal-nav">
          <button class="nav-btn today-btn" id="todayBtn">今 日</button>
          <button class="nav-btn" id="prevBtn" aria-label="上個月">‹</button>
          <button class="nav-btn" id="nextBtn" aria-label="下個月">›</button>
        </div>
      </div>

      <div class="weekdays" id="weekdays"></div>
      <div class="days" id="days"></div>

      <div class="legend">
        <div class="legend-item"><span class="swatch-today"></span><span>今天</span></div>
        <div class="legend-item"><span class="dot"></span><span>已有預約</span></div>
        <div class="legend-item"><span style="color:var(--morandi-rose)">●</span><span>週日</span></div>
      </div>
    </section>
  </div>

  <!-- 遮罩 & Modal -->
  <div class="overlay" id="overlay"></div>

  <div class="modal" id="modal" role="dialog" aria-modal="true">
    <div class="modal-head">
      <div>
        <h3 class="modal-title" id="modalDate">—</h3>
        <p class="modal-sub" id="modalSub">新增與管理當日預約</p>
      </div>
      <button class="close-btn" id="closeBtn" aria-label="關閉">✕</button>
    </div>

    <div class="existing">
      <div class="existing-head">
        <h4>當日預約</h4>
        <span class="count-chip" id="countChip">0</span>
      </div>
      <div id="bookingList"></div>
      <button type="button" class="btn-add" id="showFormBtn">
        <span class="plus">＋</span><span>新增預約</span>
      </button>
    </div>

    <div class="divider hidden" id="formDivider"></div>

    <form id="bookingForm" class="form-panel hidden" autocomplete="off">
      <div class="form-head">
        <h4 id="formTitle">新增預約</h4>
      </div>
      <div class="form-group">
        <label for="nameInput">預約人姓名</label>
        <input class="input" type="text" id="nameInput" placeholder="請輸入預約人姓名" required />
      </div>

      <div class="form-group">
        <label>預約時段</label>
        <div class="time-row">
          <select class="select" id="startTime" required></select>
          <span class="sep">—</span>
          <select class="select" id="endTime" required></select>
        </div>
        <div class="status-row">
          <label class="status-pill" data-status="confirmed">
            <input type="radio" name="status" value="confirmed" />
            <span class="dot"></span><span>已確定</span>
          </label>
          <label class="status-pill" data-status="pending">
            <input type="radio" name="status" value="pending" checked />
            <span class="dot"></span><span>未確定</span>
          </label>
        </div>
      </div>

      <div class="form-group">
        <label>聯絡方式</label>
        <div class="check-grid">
          <label class="check">
            <input type="radio" name="contact" value="LINE 官方" />
            <span class="box"></span>
            <span class="label">LINE 官方</span>
          </label>
          <label class="check">
            <input type="radio" name="contact" value="電話預約" checked />
            <span class="box"></span>
            <span class="label">電話預約</span>
          </label>
          <label class="check">
            <input type="radio" name="contact" value="臉書" />
            <span class="box"></span>
            <span class="label">臉書</span>
          </label>
          <label class="check">
            <input type="radio" name="contact" value="現場" />
            <span class="box"></span>
            <span class="label">現場</span>
          </label>
        </div>
      </div>

      <div class="form-group">
        <label for="totalRollsInput">總捲數</label>
        <div class="rolls-row">
          <input class="input rolls-input" type="number" id="totalRollsInput" min="0" step="1" value="0" />
          <button type="button" id="toggleBagsBtn" class="btn-toggle">
            <span class="bag-ico">🛍</span><span>分袋裝</span>
          </button>
        </div>

        <div id="bagsSection" class="bags-section hidden">
          <div class="bags-head">
            <span class="bags-title">分袋明細</span>
            <span class="bags-sum" id="bagsSum">0 / 0</span>
          </div>
          <div id="bagsList" class="bags-list"></div>
          <button type="button" id="addBagBtn" class="btn-add-bag">＋ 加一袋</button>
        </div>
      </div>

      <div class="form-group">
        <label for="noteInput">備註 <span class="optional">（選填）</span></label>
        <textarea class="input textarea" id="noteInput" rows="3" placeholder="例如：過敏、特殊需求、來訪人數…"></textarea>
      </div>

      <div class="actions">
        <button type="button" class="btn btn-ghost" id="cancelBtn">取 消</button>
        <button type="submit" class="btn btn-primary" id="submitBtn">確認送出</button>
      </div>
    </form>
  </div>

  <div class="toast" id="toast"></div>

<script>
(() => {
  "use strict";

  // ⚙️ 部署完 Render 後，把下面字串改成你的 API 網址（不要尾端斜線）
  //    例如: "https://bookweb-api.onrender.com"
  //    本機開發可填 "http://localhost:5000"
  const API_BASE = "https://bookweb-api.onrender.com";

  const LEGACY_STORAGE_KEY = "morandi_bookings_v1"; // 僅供 migrateFromLocalStorage() 使用
  const WEEKDAYS = ["日","一","二","三","四","五","六"];
  const MONTH_NAMES = ["一月","二月","三月","四月","五月","六月","七月","八月","九月","十月","十一月","十二月"];

  /* ---------- DOM ---------- */
  const $ = (id) => document.getElementById(id);
  const monthLabel = $("monthLabel");
  const yearLabel  = $("yearLabel");
  const weekdaysEl = $("weekdays");
  const daysEl     = $("days");
  const todayChip  = $("todayChip");

  const overlay    = $("overlay");
  const modal      = $("modal");
  const modalDate  = $("modalDate");
  const modalSub   = $("modalSub");
  const closeBtn   = $("closeBtn");
  const cancelBtn  = $("cancelBtn");

  const form       = $("bookingForm");
  const nameInput  = $("nameInput");
  const noteInput  = $("noteInput");
  const startTime  = $("startTime");
  const endTime    = $("endTime");
  const bookingList= $("bookingList");
  const showFormBtn= $("showFormBtn");
  const formDivider= $("formDivider");
  const formTitle  = $("formTitle");
  const submitBtn  = $("submitBtn");
  const countChip  = $("countChip");
  const toast      = $("toast");
  const totalRollsInput = $("totalRollsInput");
  const toggleBagsBtn   = $("toggleBagsBtn");
  const bagsSection     = $("bagsSection");
  const bagsListEl      = $("bagsList");
  const bagsSumEl       = $("bagsSum");
  const addBagBtn       = $("addBagBtn");

  /* ---------- 狀態 ---------- */
  const now = new Date();
  let viewYear  = now.getFullYear();
  let viewMonth = now.getMonth(); // 0-11
  let selectedDateKey = null;     // "YYYY-MM-DD"
  let formMode = "create";        // "create" | "edit"
  let editingId = null;

  // 分袋狀態
  let isSplit = false;
  let bagsState = [];

  const CN_NUMS = "一二三四五六七八九十";
  function bagLabel(i){
    return i < 10 ? `第${CN_NUMS[i]}袋` : `第${i+1}袋`;
  }

  // 當月資料快取，key = "YYYY-MM-DD"
  let bookingsByDate = {};
  let loadedMonthKey = "";  // 已載入的月份 "YYYY-MM"

  /* ---------- API ---------- */
  async function apiFetch(path, opts = {}) {
    if (!API_BASE) throw new Error("尚未設定 API_BASE");
    const res = await fetch(API_BASE + path, {
      headers: { "Content-Type": "application/json" },
      ...opts,
    });
    if (!res.ok) {
      let msg = `HTTP ${res.status}`;
      try { const j = await res.json(); if (j.error) msg = j.error; } catch {}
      throw new Error(msg);
    }
    if (res.status === 204) return null;
    return await res.json();
  }

  async function loadMonth(year, month, { force = false } = {}) {
    const mKey = `${year}-${pad(month+1)}`;
    if (loadedMonthKey === mKey && !force) return;
    const lastDay = new Date(year, month+1, 0).getDate();
    const from = `${mKey}-01`;
    const to   = `${mKey}-${pad(lastDay)}`;
    daysEl.classList.add("loading");
    try {
      const list = await apiFetch(`/api/bookings?from=${from}&to=${to}`);
      bookingsByDate = {};
      for (const b of list) (bookingsByDate[b.date] ||= []).push(b);
      loadedMonthKey = mKey;
    } catch (e) {
      showToast("無法連線後端：" + e.message, "error");
      throw e;
    } finally {
      daysEl.classList.remove("loading");
    }
  }

  function getBookings(key) {
    return bookingsByDate[key] || [];
  }

  async function apiCreate(payload) {
    return apiFetch("/api/bookings", {
      method: "POST",
      body: JSON.stringify(payload),
    });
  }
  async function apiUpdate(id, payload) {
    return apiFetch(`/api/bookings/${encodeURIComponent(id)}`, {
      method: "PUT",
      body: JSON.stringify(payload),
    });
  }
  async function apiDelete(id) {
    return apiFetch(`/api/bookings/${encodeURIComponent(id)}`, {
      method: "DELETE",
    });
  }

  /* ---------- 工具 ---------- */
  function pad(n){ return String(n).padStart(2, "0"); }
  function dateKey(y, m, d){ return `${y}-${pad(m+1)}-${pad(d)}`; }
  function isSameDay(a, b){
    return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate();
  }
  function addMinutes(t, mins){
    const [h, m] = t.split(":").map(Number);
    let total = h * 60 + m + mins;
    if (total >= 24 * 60) total = 23 * 60 + 55;
    return `${pad(Math.floor(total/60))}:${pad(total%60)}`;
  }
  function isMobile(){ return window.innerWidth <= 768; }
  function showToast(msg, type="ok"){
    toast.textContent = msg;
    toast.classList.toggle("error", type === "error");
    toast.classList.add("show");
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => toast.classList.remove("show"), 2200);
  }

  /* ---------- 月曆渲染 ---------- */
  function renderWeekdays(){
    weekdaysEl.innerHTML = WEEKDAYS.map((w, i) =>
      `<div class="weekday${i===0?" sun":""}">${w}</div>`
    ).join("");
  }

  function renderCalendar(){
    monthLabel.textContent = MONTH_NAMES[viewMonth];
    yearLabel.textContent  = viewYear;

    const firstDay   = new Date(viewYear, viewMonth, 1).getDay(); // 0=Sun
    const daysInMon  = new Date(viewYear, viewMonth + 1, 0).getDate();
    const today      = new Date();

    let html = "";
    for (let i = 0; i < firstDay; i++){
      html += `<div class="day empty"></div>`;
    }
    for (let d = 1; d <= daysInMon; d++){
      const dObj = new Date(viewYear, viewMonth, d);
      const dow  = dObj.getDay();
      const key  = dateKey(viewYear, viewMonth, d);
      const bookings = getBookings(key);
      const hasBooking = bookings.length > 0;
      const cls = [
        "day",
        dow === 0 ? "sun" : "",
        isSameDay(dObj, today) ? "today" : "",
        hasBooking ? "has-booking" : ""
      ].filter(Boolean).join(" ");

      html += `
        <div class="${cls}" data-key="${key}">
          <div class="day-num">${d}</div>
          <div class="badge"><span class="dot"></span><span>${bookings.length} 筆</span></div>
        </div>
      `;
    }
    daysEl.innerHTML = html;

    daysEl.querySelectorAll(".day:not(.empty)").forEach(el => {
      el.addEventListener("click", () => openModal(el.dataset.key));
    });
  }

  /* ---------- 時間下拉 ---------- */
  function buildTimeOptions(selectEl, defVal){
    let opts = "";
    for (let h = 0; h < 24; h++){
      for (let m = 0; m < 60; m += 5){
        const v = `${pad(h)}:${pad(m)}`;
        opts += `<option value="${v}"${v===defVal?" selected":""}>${v}</option>`;
      }
    }
    selectEl.innerHTML = opts;
  }

  /* ---------- Modal ---------- */
  function openModal(key){
    selectedDateKey = key;
    const [y, m, d] = key.split("-").map(Number);
    const dObj = new Date(y, m-1, d);
    const wk = WEEKDAYS[dObj.getDay()];
    modalDate.textContent = `${y} / ${pad(m)} / ${pad(d)}（週${wk}）`;

    buildTimeOptions(startTime, "10:00");
    buildTimeOptions(endTime,   "11:00");

    hideForm();           // 進來預設不顯示表單
    renderBookingList();

    overlay.classList.add("open");
    modal.classList.add("open");
    document.body.style.overflow = "hidden";
  }

  function closeModal(){
    overlay.classList.remove("open");
    modal.classList.remove("open");
    document.body.style.overflow = "";
    selectedDateKey = null;
    hideForm();
  }

  /* ---------- 分袋 UI ---------- */
  function renderBags(){
    bagsListEl.innerHTML = bagsState.map((c, i) => `
      <div class="bag-row">
        <span class="bag-label">${bagLabel(i)}</span>
        <input type="number" min="0" step="1" value="${c}" class="input bag-input" data-i="${i}" />
        <button type="button" class="bag-del" data-i="${i}" ${bagsState.length <= 1 ? "disabled" : ""} aria-label="刪除">×</button>
      </div>
    `).join("");
    bagsListEl.querySelectorAll(".bag-input").forEach(inp => {
      inp.addEventListener("input", () => {
        const idx = +inp.dataset.i;
        bagsState[idx] = Math.max(0, parseInt(inp.value, 10) || 0);
        syncTotalFromBags();
      });
    });
    bagsListEl.querySelectorAll(".bag-del").forEach(btn => {
      btn.addEventListener("click", () => {
        const idx = +btn.dataset.i;
        bagsState.splice(idx, 1);
        renderBags();
        syncTotalFromBags();
      });
    });
    syncTotalFromBags();
  }

  // 分袋裝開啟時，總捲數 = 各袋總和（自動帶出）
  function syncTotalFromBags(){
    if (!isSplit) return;
    const sum = bagsState.reduce((a,b) => a+b, 0);
    totalRollsInput.value = sum;
    bagsSumEl.textContent = `共 ${bagsState.length} 袋．總和 ${sum} 捲`;
  }

  function setSplit(on){
    isSplit = on;
    bagsSection.classList.toggle("hidden", !on);
    toggleBagsBtn.classList.toggle("active", on);
    totalRollsInput.disabled = on;
    totalRollsInput.classList.toggle("auto", on);
    if (on){
      if (bagsState.length === 0) bagsState = [0, 0];
      renderBags();
    } else {
      // 關閉時讓 total 可編輯，保留目前數字
      bagsSumEl.textContent = "";
    }
  }

  toggleBagsBtn.addEventListener("click", () => setSplit(!isSplit));
  addBagBtn.addEventListener("click", () => {
    if (bagsState.length >= 50){ showToast("最多 50 袋", "error"); return; }
    bagsState.push(0);
    renderBags();
  });

  /* ---------- 預約時段：開始時間變動，結束自動 +5 分鐘 ---------- */
  startTime.addEventListener("change", () => {
    if (endTime.value <= startTime.value){
      endTime.value = addMinutes(startTime.value, 5);
    }
  });

  /* ---------- 備註欄位：手機鍵盤彈出時把備註捲到可視區 ---------- */
  noteInput.addEventListener("focus", () => {
    if (!isMobile()) return;
    modal.classList.add("kb-up");
    setTimeout(() => {
      const mRect = modal.getBoundingClientRect();
      const nRect = noteInput.getBoundingClientRect();
      modal.scrollTop += (nRect.top - mRect.top) - 24;
    }, 320);
  });
  noteInput.addEventListener("blur", () => {
    modal.classList.remove("kb-up");
  });

  /* ---------- 表單面板開合 ---------- */
  function resetFormDefaults(){
    form.reset();
    form.querySelectorAll(".check input").forEach(cb => {
      cb.checked = (cb.value === "電話預約");
    });
    // 狀態預設「未確定」
    form.querySelectorAll("input[name='status']").forEach(r => {
      r.checked = (r.value === "pending");
    });
    startTime.value = "10:00";
    endTime.value   = "11:00";
    noteInput.value = "";
    totalRollsInput.value = 0;
    totalRollsInput.disabled = false;
    totalRollsInput.classList.remove("auto");
    bagsState = [];
    setSplit(false);
  }

  function showForm(mode, booking){
    formMode  = mode;
    editingId = booking ? booking.id : null;

    if (mode === "edit" && booking){
      formTitle.textContent = "編輯預約";
      submitBtn.textContent = "儲存變更";
      modalSub.textContent  = "修改既有預約內容";
      nameInput.value = booking.name;
      startTime.value = booking.start;
      endTime.value   = booking.end;
      noteInput.value = booking.note || "";
      form.querySelectorAll(".check input").forEach(cb => {
        cb.checked = (booking.contacts || []).includes(cb.value);
      });
      // 單選後備：若沒有任何被選到（資料異常）就預設電話預約
      if (!form.querySelector(".check input:checked")){
        const fallback = form.querySelector(".check input[value='電話預約']");
        if (fallback) fallback.checked = true;
      }
      totalRollsInput.value = booking.totalRolls || 0;
      bagsState = Array.isArray(booking.bags) ? booking.bags.slice() : [];
      setSplit(bagsState.length > 0);
      // 帶入狀態
      const targetStatus = booking.status || "pending";
      form.querySelectorAll("input[name='status']").forEach(r => {
        r.checked = (r.value === targetStatus);
      });
    } else {
      formTitle.textContent = "新增預約";
      submitBtn.textContent = "確認送出";
      modalSub.textContent  = "新增一筆當日預約";
      resetFormDefaults();
    }

    form.classList.remove("hidden");
    formDivider.classList.remove("hidden");
    showFormBtn.classList.add("hidden");
    setTimeout(() => {
      nameInput.focus();
      form.scrollIntoView({ behavior: "smooth", block: "nearest" });
    }, 80);
  }

  function hideForm(){
    formMode  = "create";
    editingId = null;
    form.classList.add("hidden");
    formDivider.classList.add("hidden");
    showFormBtn.classList.remove("hidden");
    modalSub.textContent = "當日預約一覽";
    resetFormDefaults();
  }

  function renderBookingList(){
    const list = getBookings(selectedDateKey);
    countChip.textContent = list.length;

    if (list.length === 0){
      bookingList.innerHTML = `<div class="empty-state">這天還沒有預約</div>`;
      return;
    }
    bookingList.innerHTML = list.map(b => {
      const total = b.totalRolls || 0;
      const bags  = Array.isArray(b.bags) ? b.bags : [];
      let rollsHTML = "";
      if (total > 0){
        const splitTxt = bags.length > 0 ? `<span class="split">．分 ${bags.length} 袋</span>` : "";
        rollsHTML = `<div class="rolls"><span class="roll-ico">📦</span>總共 ${total} 捲${splitTxt}</div>`;
      }
      const status = b.status || "pending";
      const statusTxt = status === "confirmed" ? "已確定" : "未確定";
      return `
      <div class="booking-item">
        <div class="booking-info">
          <div class="name">${escapeHTML(b.name)}</div>
          <div class="meta">${b.start} — ${b.end}<span class="status-badge ${status}">${statusTxt}</span></div>
          ${rollsHTML}
          <div class="tags">${(b.contacts||[]).map(c => `<span class="tag">${escapeHTML(c)}</span>`).join("")}</div>
          ${b.note ? `<div class="note">${escapeHTML(b.note)}</div>` : ""}
        </div>
        <div class="item-actions">
          <button class="edit-btn" data-id="${b.id}">編 輯</button>
          <button class="del-btn"  data-id="${b.id}">刪 除</button>
        </div>
      </div>
    `;}).join("");

    bookingList.querySelectorAll(".edit-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const target = getBookings(selectedDateKey).find(b => b.id === btn.dataset.id);
        if (target) showForm("edit", target);
      });
    });
    bookingList.querySelectorAll(".del-btn").forEach(btn => {
      btn.addEventListener("click", async () => {
        if (!confirm("確定刪除這筆預約？")) return;
        const id = btn.dataset.id;
        btn.disabled = true;
        try {
          await apiDelete(id);
          if (formMode === "edit" && editingId === id) hideForm();
          await loadMonth(viewYear, viewMonth, { force: true });
          renderBookingList();
          renderCalendar();
          showToast("已刪除預約");
        } catch (e) {
          showToast("刪除失敗：" + e.message, "error");
          btn.disabled = false;
        }
      });
    });
  }

  function escapeHTML(s){
    return String(s).replace(/[&<>"']/g, c => ({
      "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
    })[c]);
  }

  /* ---------- 表單送出 ---------- */
  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const name = nameInput.value.trim();
    const s = startTime.value;
    const en = endTime.value;
    const checkedRadio = form.querySelector(".check input:checked");
    const contacts = checkedRadio ? [checkedRadio.value] : [];
    const note = noteInput.value.trim();
    const bags = isSplit ? bagsState.map(n => Math.max(0, parseInt(n, 10) || 0)) : [];
    const totalRolls = isSplit
      ? bags.reduce((a,b) => a+b, 0)
      : Math.max(0, parseInt(totalRollsInput.value, 10) || 0);
    const statusRadio = form.querySelector("input[name='status']:checked");
    const status = statusRadio ? statusRadio.value : "pending";

    if (!name){ showToast("請輸入預約人姓名", "error"); return; }
    if (s >= en){ showToast("結束時間需晚於開始時間", "error"); return; }
    if (contacts.length === 0){ showToast("請選擇聯絡方式", "error"); return; }
    if (isSplit && bags.length < 1){ showToast("分袋裝至少要 1 袋", "error"); return; }

    const originalText = submitBtn.textContent;
    submitBtn.disabled = true;
    submitBtn.textContent = "處理中…";

    try {
      if (formMode === "edit" && editingId){
        await apiUpdate(editingId, { name, start: s, end: en, contacts, note, totalRolls, bags, status });
        showToast("已更新預約");
      } else {
        await apiCreate({
          date: selectedDateKey,
          name, start: s, end: en, contacts, note, totalRolls, bags, status,
        });
        showToast("預約已建立");
      }
      await loadMonth(viewYear, viewMonth, { force: true });
      hideForm();
      renderBookingList();
      renderCalendar();
    } catch (err) {
      showToast("儲存失敗：" + err.message, "error");
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = originalText;
    }
  });

  /* 新增預約按鈕 → 顯示空白表單 */
  showFormBtn.addEventListener("click", () => showForm("create"));

  /* ---------- 控制列 ---------- */
  async function gotoMonth(y, m){
    viewYear = y; viewMonth = m;
    renderCalendar();        // 先用快取畫一次（可能是空的）
    try { await loadMonth(y, m); } catch {}
    renderCalendar();        // 載入後再畫一次
  }
  $("prevBtn").addEventListener("click", () => {
    let y = viewYear, m = viewMonth - 1;
    if (m < 0){ m = 11; y--; }
    gotoMonth(y, m);
  });
  $("nextBtn").addEventListener("click", () => {
    let y = viewYear, m = viewMonth + 1;
    if (m > 11){ m = 0; y++; }
    gotoMonth(y, m);
  });
  $("todayBtn").addEventListener("click", () => {
    const t = new Date();
    gotoMonth(t.getFullYear(), t.getMonth());
  });

  overlay.addEventListener("click", closeModal);
  closeBtn.addEventListener("click", closeModal);
  cancelBtn.addEventListener("click", hideForm); // 取消 → 收起表單，回到列表
  document.addEventListener("keydown", (e) => {
    if (e.key !== "Escape") return;
    if (!modal.classList.contains("open")) return;
    // 表單開著就先收表單，沒開才整個關 modal
    if (!form.classList.contains("hidden")) hideForm();
    else closeModal();
  });

  /* ---------- 初始化 ---------- */
  async function init(){
    const t = new Date();
    todayChip.textContent = `今天 · ${t.getFullYear()} / ${pad(t.getMonth()+1)} / ${pad(t.getDate())}`;
    renderWeekdays();
    renderCalendar();                // 先畫空骨架
    try { await loadMonth(viewYear, viewMonth); } catch {}
    renderCalendar();                // 拿到資料再畫一次
  }
  init();

  /* ---------- 一次性：把 localStorage 舊資料匯入後端 ----------
     在瀏覽器 console 執行：migrateFromLocalStorage()
  */
  window.migrateFromLocalStorage = async function(){
    const raw = localStorage.getItem(LEGACY_STORAGE_KEY);
    if (!raw){ console.log("沒有本機舊資料"); return; }
    const all = JSON.parse(raw);
    let ok = 0, fail = 0;
    for (const [date, list] of Object.entries(all)){
      for (const b of list){
        try {
          await apiCreate({
            date,
            name: b.name,
            start: b.start,
            end: b.end,
            contacts: (b.contacts || []).slice(0, 1), // 舊資料可能多選，只取第一個
            note: b.note || "",
            totalRolls: b.totalRolls || 0,
            bags: b.bags || [],
            status: b.status || "pending",
          });
          ok++;
        } catch (e) {
          console.error("匯入失敗:", date, b, e);
          fail++;
        }
      }
    }
    console.log(`匯入完成：成功 ${ok} 筆，失敗 ${fail} 筆`);
    await loadMonth(viewYear, viewMonth, { force: true });
    renderCalendar();
    showToast(`匯入完成：${ok} 筆`);
  };

})();
</script>
</body>
</html>
